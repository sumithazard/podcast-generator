name: "Podcast Generator"
author: "Sumithazard"
description: "Generates a Feed for a podcast from a YAML file"
runs: 
  using: "docker"
  image: "Dockerfile"
branding:
  icon: "git-branch"
  color: "red"
inputs:
  email: 
    decsription: The Commiter's email address
    required: true
    default: ${{ github.actor }}@localhost
  name: 
    description: The Commiter's name
    required: true
    default: ${{ github.actor }}